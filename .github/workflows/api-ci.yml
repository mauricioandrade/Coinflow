# ============================================================
# Coinflow API — Continuous Integration Pipeline
#
# Triggers on changes to apps/api/** only.
#
# Jobs (sequential):
#   1. lint-and-unit  — linter + unit tests (no DB required)
#   2. e2e            — E2E tests against a real PostgreSQL instance
#
# Required GitHub Secrets:
#   - TEST_ENCRYPTION_KEY   (64 hex chars, 32 bytes)
#   - TEST_JWT_SECRET        (≥ 64 chars)
#   - TEST_JWT_REFRESH_SECRET (≥ 64 chars)
# ============================================================

name: API CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "apps/api/**"
      - ".github/workflows/api-ci.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "apps/api/**"
      - ".github/workflows/api-ci.yml"

concurrency:
  group: api-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lint + Unit Tests ─────────────────────────────────────────────
  lint-and-unit:
    name: 🔍 Lint & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        run: npm test -- --forceExit --ci
        env:
          NODE_ENV: test
          ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY || 'a1b2c3d4e5f60718293a4b5c6d7e8f90a1b2c3d4e5f60718293a4b5c6d7e8f90' }}
          JWT_SECRET: ${{ secrets.TEST_JWT_SECRET || 'test_jwt_secret_for_unit_tests_only_64chars_long_padding_padding' }}
          JWT_REFRESH_SECRET: ${{ secrets.TEST_JWT_REFRESH_SECRET || 'test_refresh_secret_for_unit_tests_only_64chars_long_padding_xx' }}

  # ── Job 2: E2E Tests (requires PostgreSQL) ───────────────────────────────
  e2e:
    name: 🕵️ E2E Tests
    runs-on: ubuntu-latest
    needs: lint-and-unit
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: coinflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/coinflow_test?schema=public

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create .env.test
        run: |
          cat > .env.test << 'ENVEOF'
          NODE_ENV=test
          PORT=3001
          APP_URL=http://localhost:3001
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/coinflow_test?schema=public
          JWT_SECRET=test_jwt_secret_for_unit_tests_only_64chars_long_padding_padding
          JWT_EXPIRES_IN=15m
          JWT_REFRESH_SECRET=test_refresh_secret_for_unit_tests_only_64chars_long_padding_xx
          JWT_REFRESH_EXPIRES_IN=7d
          ENCRYPTION_KEY=a1b2c3d4e5f60718293a4b5c6d7e8f90a1b2c3d4e5f60718293a4b5c6d7e8f90
          CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3001
          THROTTLE_TTL=60
          THROTTLE_LIMIT=100
          HONEYPOT_BLOCK_DURATION_MS=3600000
          ENVEOF

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Push Prisma schema to test database
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/coinflow_test?schema=public

      - name: Run E2E tests
        run: npm run test:e2e -- --forceExit
        env:
          NODE_ENV: test
